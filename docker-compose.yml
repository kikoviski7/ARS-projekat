version: '3.9'

services: 
  api: 
    build: .
    container_name: ars-api
    ports: 
      - "8000:8000"
    environment:
      - DB=consul
      - DBPORT=8500
    depends_on:
      - consul
    
  consul:
    image: hashicorp/consul:latest
    ports:
      - "8500:8500"
      - "8600:8600/udp"
      - "8600:8600/tcp"
    command: "agent -server -ui -bootstrap-expect 1 -client 0.0.0.0"
    volumes:
      - ./consul-data:/consul/data